<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Resizer — Tests</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    /* Results panel — pinned to the bottom; the live app renders above it. */
    .test-results {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 50vh;
      overflow: auto;
      background: #0b0b10;
      color: #e6e6ee;
      font: 12.5px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace;
      padding: 12px 16px 16px;
      border-top: 1px solid #2a2a35;
      box-shadow: 0 -8px 24px rgba(0,0,0,0.45);
      z-index: 9999;
    }
    .test-summary { font-weight: 700; margin-bottom: 8px; font-size: 13px; }
    .test-summary.pass { color: #6ee7b7; }
    .test-summary.fail { color: #fca5a5; }
    .test-summary.run  { color: #c4b5fd; }
    .test-fail {
      color: #fca5a5;
      white-space: pre-wrap;
      margin: 6px 0;
      padding: 6px 10px;
      background: #20141a;
      border-left: 2px solid #f87171;
      border-radius: 3px;
    }
    .test-actions { float: right; }
    .test-actions button {
      background: #2a2a35; color: #e6e6ee; border: 1px solid #3f3f4d;
      padding: 4px 10px; font: inherit; border-radius: 4px; cursor: pointer;
    }
    .test-actions button:hover { background: #34343f; }
  </style>
</head>
<body>

  <!-- The live app gets grafted in here so tests run against the real DOM
       structure (no chance of drift between this page and index.html). -->
  <div id="test-app-mount"></div>

  <div class="test-results" id="test-results">
    <div class="test-actions">
      <button type="button" onclick="location.reload()">Re-run</button>
    </div>
    <div class="test-summary run" id="test-summary">Loading app and running tests…</div>
    <div id="test-detail"></div>
  </div>

  <script>
    (async () => {
      const summary = document.getElementById('test-summary');
      const detail  = document.getElementById('test-detail');
      const setSummary = (cls, text) => { summary.className = 'test-summary ' + cls; summary.textContent = text; };
      const esc = (s) => String(s ?? '').replace(/[&<>'"]/g,
        c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
      const loadScript = (src) => new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = src; s.onload = res; s.onerror = () => rej(new Error('failed to load ' + src));
        document.head.appendChild(s);
      });

      try {
        // Pull the live page's body markup so we can never disagree with it.
        const html = await (await fetch('../index.html')).text();
        const doc  = new DOMParser().parseFromString(html, 'text/html');
        document.getElementById('test-app-mount').innerHTML = doc.body.innerHTML;

        // App's IIFE binds to the grafted DOM at script-load time.
        await loadScript('../app.js');

        // Tests assume a clean preference state.
        try { localStorage.removeItem('image-resizer-prefs-v1'); } catch {}

        await loadScript('./run.js');
        if (typeof window.__runTests !== 'function') {
          throw new Error('test runner did not install window.__runTests');
        }

        setSummary('run', 'Running…');
        const t0 = performance.now();
        const out = await window.__runTests();
        const dt = ((performance.now() - t0) / 1000).toFixed(1);

        const ok = out.failedCount === 0;
        setSummary(ok ? 'pass' : 'fail',
          `${ok ? 'PASS' : 'FAIL'} — ${out.passed}/${out.total} (${out.failedCount} failed) in ${dt}s`);

        if (!ok) {
          detail.innerHTML = out.failed.map(f => {
            const got  = 'got'  in f ? `\n   got  = ${esc(JSON.stringify(f.got))}`  : '';
            const want = 'want' in f ? `\n   want = ${esc(JSON.stringify(f.want))}` : '';
            return `<div class="test-fail">✗ ${esc(f.name)}\n   ${esc(f.msg || '')}${got}${want}</div>`;
          }).join('');
        } else {
          detail.textContent = '';
        }
      } catch (e) {
        setSummary('fail', 'ERROR: ' + e.message);
        detail.innerHTML = `<pre class="test-fail">${esc(e.stack || e.message)}</pre>`;
      }
    })();
  </script>
</body>
</html>
